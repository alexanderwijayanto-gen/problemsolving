<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Sizing - Herbisida Padi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .readonly-input { background-color: #e5e7eb; color: #374151; font-weight: 600; cursor: not-allowed; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="text-gray-800 p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="bg-green-700 text-white p-6 rounded-t-xl shadow-lg flex items-center justify-between">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold"><i class="fas fa-seedling mr-2"></i> Market Sizing Calculator</h1>
                <p class="text-green-100 mt-1">Jendela Aplikasi Herbisida Padi</p>
            </div>
            <div class="text-right bg-green-800 p-3 rounded-lg border border-green-600">
                <label class="block text-xs text-green-200 uppercase tracking-wide">Total Market Size (All Windows)</label>
                <div class="text-2xl font-bold text-yellow-300" id="grand-total">Rp 0</div>
            </div>
        </div>

        <!-- Global Parameter -->
        <div class="bg-white p-6 shadow-md border-b border-gray-200 flex flex-col md:flex-row items-center gap-4">
            <label class="font-bold text-gray-700 w-full md:w-1/3">Luas Panen Area Survey (BPS) - Hektar:</label>
            <input type="number" id="global-area" value="661894" class="w-full md:w-1/3 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 text-lg font-bold" oninput="calculateAll()">
        </div>

        <!-- Windows Container -->
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mt-6" id="windows-container">
            <!-- Cards will be generated by JS -->
        </div>
    </div>

    <script>
        // Data inisial berdasarkan file PDF dan CSV
        const windowsData = [
            {
                id: "w1",
                title: "Pra Tumbuh (Pre Emergence) 0 – 5 HST",
                penetrasi: 50.74,
                treatedLand: 94.43,
                dosisTangki: 29.26,
                jmlTangki: 8.69,
                hargaRata: 121108,
                kemasan: 217
            },
            {
                id: "w2",
                title: "Purna Tumbuh Awal (Early Post Emergence) 6 - 14 HST",
                penetrasi: 42.23,
                treatedLand: 94.92,
                dosisTangki: 27.26,
                jmlTangki: 9.09,
                hargaRata: 116483,
                kemasan: 219.61
            },
            {
                id: "w3",
                title: "Purna Tumbuh (Post Emergence) 10 – 20 HST",
                penetrasi: 43.15,
                treatedLand: 93.14,
                dosisTangki: 27.48,
                jmlTangki: 8.85,
                hargaRata: 142656,
                kemasan: 284.65
            },
            {
                id: "w4",
                title: "Purna Tumbuh Akhir (Late Post Emergence) < 25 HST",
                penetrasi: 37.86,
                treatedLand: 85.51,
                dosisTangki: 26.45,
                jmlTangki: 8.32,
                hargaRata: 177376,
                kemasan: 255.16
            }
        ];

        // Formatters
        const formatRp = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(num);
        const formatNum = (num) => new Intl.NumberFormat('id-ID', { maximumFractionDigits: 2 }).format(num);

        function renderCards() {
            const container = document.getElementById('windows-container');
            container.innerHTML = '';

            windowsData.forEach(data => {
                const card = `
                <div class="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden flex flex-col">
                    <div class="bg-green-600 text-white p-4">
                        <h2 class="font-bold text-lg">${data.title}</h2>
                    </div>
                    
                    <div class="p-5 flex-grow space-y-4">
                        <!-- Input Section -->
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Penetrasi (%)</label>
                                <input type="number" id="${data.id}-penetrasi" value="${data.penetrasi}" step="0.01" class="w-full p-2 border rounded focus:ring-1 focus:ring-green-500" oninput="calculateAll()">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Treated Land (%)</label>
                                <input type="number" id="${data.id}-treated" value="${data.treatedLand}" step="0.01" class="w-full p-2 border rounded focus:ring-1 focus:ring-green-500" oninput="calculateAll()">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Dosis/Tangki (ml)</label>
                                <input type="number" id="${data.id}-dosis" value="${data.dosisTangki}" step="0.01" class="w-full p-2 border rounded focus:ring-1 focus:ring-green-500" oninput="calculateAll()">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Jml Tangki</label>
                                <input type="number" id="${data.id}-tangki" value="${data.jmlTangki}" step="0.01" class="w-full p-2 border rounded focus:ring-1 focus:ring-green-500" oninput="calculateAll()">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Harga Herbisida (Rp)</label>
                                <input type="number" id="${data.id}-harga" value="${data.hargaRata}" class="w-full p-2 border rounded focus:ring-1 focus:ring-green-500" oninput="calculateAll()">
                            </div>
                            <div>
                                <label class="block text-xs text-gray-500 mb-1">Kemasan (ml)</label>
                                <input type="number" id="${data.id}-kemasan" value="${data.kemasan}" step="0.01" class="w-full p-2 border rounded focus:ring-1 focus:ring-green-500" oninput="calculateAll()">
                            </div>
                        </div>

                        <hr class="my-4 border-gray-200">

                        <!-- Result Section -->
                        <div class="space-y-3">
                            <div class="flex justify-between items-center text-sm">
                                <span class="text-gray-600">Output Area (HA)</span>
                                <input type="text" id="${data.id}-out-ha" class="readonly-input p-1 rounded w-1/2 text-right border-none" readonly>
                            </div>
                            <div class="flex justify-between items-center text-sm">
                                <span class="text-gray-600">Volume Dosis (ml/Ha)</span>
                                <input type="text" id="${data.id}-out-ml" class="readonly-input p-1 rounded w-1/2 text-right border-none" readonly>
                            </div>
                            <div class="flex justify-between items-center text-sm">
                                <span class="text-gray-600">Biaya per Ha (Rp)</span>
                                <input type="text" id="${data.id}-out-biaya" class="readonly-input p-1 rounded w-1/2 text-right border-none text-red-600" readonly>
                            </div>
                        </div>
                    </div>

                    <!-- Card Footer Market Size -->
                    <div class="bg-gray-50 p-4 border-t border-gray-200">
                        <label class="block text-xs text-gray-500 uppercase tracking-wide">Market Size Jendela Ini</label>
                        <div class="text-xl font-bold text-green-700" id="${data.id}-marketsize">Rp 0</div>
                    </div>
                </div>
                `;
                container.innerHTML += card;
            });
        }

        function calculateAll() {
            const globalArea = parseFloat(document.getElementById('global-area').value) || 0;
            let grandTotal = 0;

            windowsData.forEach(data => {
                // Get inputs
                const penetrasi = parseFloat(document.getElementById(`${data.id}-penetrasi`).value) || 0;
                const treated = parseFloat(document.getElementById(`${data.id}-treated`).value) || 0;
                const dosisTangki = parseFloat(document.getElementById(`${data.id}-dosis`).value) || 0;
                const jmlTangki = parseFloat(document.getElementById(`${data.id}-tangki`).value) || 0;
                const hargaRata = parseFloat(document.getElementById(`${data.id}-harga`).value) || 0;
                const kemasan = parseFloat(document.getElementById(`${data.id}-kemasan`).value) || 0;

                // 1. Calculate Area (HA)
                const appliedLand = (penetrasi / 100) * (treated / 100);
                const outputHA = globalArea * appliedLand;

                // 2. Calculate Volume (ML)
                const outputML = dosisTangki * jmlTangki;
                const dosisHaLiter = outputML / 1000;

                // 3. Calculate Biaya per Ha
                // Formula based on CSV: Harga asumsi 500ml = (Harga / Kemasan) * 500
                const hargaAsumsi500 = kemasan > 0 ? (hargaRata / kemasan) * 500 : 0;
                const biayaPerHa = dosisHaLiter * hargaAsumsi500;

                // 4. Calculate Market Size
                const marketSize = outputHA * biayaPerHa;
                grandTotal += marketSize;

                // Update UI for this window
                document.getElementById(`${data.id}-out-ha`).value = formatNum(outputHA);
                document.getElementById(`${data.id}-out-ml`).value = formatNum(outputML);
                document.getElementById(`${data.id}-out-biaya`).value = formatRp(biayaPerHa);
                document.getElementById(`${data.id}-marketsize`).innerText = formatRp(marketSize);
            });

            // Update Grand Total
            document.getElementById('grand-total').innerText = formatRp(grandTotal);
        }

        // Initialize App
        window.onload = () => {
            renderCards();
            calculateAll();
        };
    </script>
</body>
</html>
